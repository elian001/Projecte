<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>💀 POLICIA ELIMINAT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: #ecf0f1;
            overflow: hidden;
        }

        .blood-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }

        .blood-drop {
            position: absolute;
            width: 8px;
            height: 30px;
            background: linear-gradient(to bottom, #8b0000, #cc0000);
            border-radius: 0 0 50% 50%;
            animation: drip linear forwards;
            top: -40px;
        }

        @keyframes drip {
            0%   { top: -40px; opacity: 1; }
            80%  { opacity: 1; }
            100% { top: 110vh; opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        .title {
            font-size: 4em;
            font-weight: bold;
            color: #e74c3c;
            text-shadow: 0 0 30px #e74c3c, 0 0 60px #8b0000;
            animation: flicker 0.15s infinite alternate;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }

        @keyframes flicker {
            from { opacity: 1; text-shadow: 0 0 30px #e74c3c, 0 0 60px #8b0000; }
            to   { opacity: 0.85; text-shadow: 0 0 15px #e74c3c; }
        }

        .subtitle {
            font-size: 1.4em;
            color: #e67e22;
            letter-spacing: 3px;
            margin-bottom: 40px;
            animation: fadeIn 1s ease forwards;
        }

        .video-container {
            width: 560px;
            max-width: 90vw;
            border: 4px solid #e74c3c;
            box-shadow: 0 0 40px rgba(231, 76, 60, 0.6), 0 0 80px rgba(139, 0, 0, 0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
            background: #000;
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .video-container iframe,
        .video-container video {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
        }

        .placeholder-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1em;
            gap: 10px;
        }

        .placeholder-video .icon { font-size: 4em; }
        .placeholder-video .note { font-size: 0.8em; color: #444; max-width: 300px; }

        .stats {
            background: rgba(231, 76, 60, 0.1);
            border: 2px solid #e74c3c;
            border-radius: 4px;
            padding: 15px 30px;
            margin-bottom: 30px;
            font-size: 1.1em;
            color: #ecf0f1;
            animation: fadeIn 1.5s ease forwards;
        }

        .stats span { color: #e74c3c; font-weight: bold; }

        .btn-tornar {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            border-bottom: 4px solid #8b0000;
            animation: fadeIn 2s ease forwards;
            transition: background 0.2s;
        }
        .btn-tornar:hover { background: #c0392b; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .machete-icon {
            font-size: 5em;
            animation: spin 0.5s ease forwards;
            display: block;
            margin-bottom: 20px;
        }

        @keyframes spin {
            from { transform: rotate(-180deg) scale(0); opacity: 0; }
            to   { transform: rotate(0deg) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<canvas class="blood-overlay" id="bloodCanvas"></canvas>

<div class="container">
    <span class="machete-icon">🔪</span>
    <div class="title">ELIMINAT!</div>
    <div class="subtitle">LA POLICIA HA CAIGUT</div>

    <div class="video-container">
        <!--
            INSTRUCCIONS:
            Substitueix el contingut d'aquí per el teu vídeo.

            OPCIÓ 1 — YouTube:
            <iframe src="https://www.youtube.com/embed/EL_ID_DEL_VIDEO?autoplay=1"
                    allow="autoplay; encrypted-media" allowfullscreen></iframe>

            OPCIÓ 2 — Vídeo local:
            <video src="video_kill.mp4" autoplay controls></video>
        -->
        <div class="placeholder-video">
            <span class="icon">🎬</span>
            <div>Col·loca aquí el teu vídeo</div>
            <div class="note">
                Obre kill_celebration.html i substitueix aquest bloc per un
                &lt;iframe&gt; de YouTube o un &lt;video&gt; local.
            </div>
        </div>
    </div>

    <div class="stats">
        Policies eliminades: <span id="kills">—</span> &nbsp;|&nbsp;
        Machetes restants: <span id="machetes">—</span>
    </div>

    <button class="btn-tornar" onclick="window.close()">⬅ TORNAR AL JOC</button>
</div>

<script>
    // Llegir paràmetres de la URL
    var params = new URLSearchParams(window.location.search);
    var kills    = params.get('kills')    || '1';
    var machetes = params.get('machetes') || '0';
    document.getElementById('kills').textContent    = kills;
    document.getElementById('machetes').textContent = machetes;

    // Gotes de sang animades
    var canvas = document.getElementById('bloodCanvas');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    function crearGota() {
        var drop = document.createElement('div');
        drop.className = 'blood-drop';
        drop.style.left = Math.random() * 100 + 'vw';
        var dur = (1.5 + Math.random() * 2).toFixed(2) + 's';
        drop.style.animationDuration = dur;
        drop.style.width  = (4 + Math.random() * 8) + 'px';
        drop.style.height = (20 + Math.random() * 40) + 'px';
        document.body.appendChild(drop);
        setTimeout(function() { drop.remove(); }, parseFloat(dur) * 1000 + 200);
    }

    setInterval(crearGota, 120);
    for(var i = 0; i < 20; i++) setTimeout(crearGota, i * 60);
</script>
</body>
</html>
